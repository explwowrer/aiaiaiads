baseURL = "https://aiaiaiads.com/"
title = "aiaiaiads"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
disableKinds = ["taxonomy", "term"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[minify]
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepWhitespace = true

[outputs]
  home = ["HTML"]
  section = ["HTML"]
  page = ["HTML"]

[outputFormats]
  [outputFormats.RSS]
    baseName = "index"

# RSS only for blog — enabled via front matter in blog/_index.md

