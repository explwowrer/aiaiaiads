{{ define "main" }}

<section class="section">
  <div class="container">
    <h1 style="margin-bottom: 1rem;">{{ .Params.h1 | default .Title }}</h1>
    <div class="prose" style="margin-bottom: 2rem;">{{ .Content }}</div>
    <div class="grid grid-3 format-hub-grid">
      {{ range .Pages }}
      <a href="{{ .RelPermalink }}" class="card format-hub-card">
        <div class="format-hub-icon" aria-hidden="true">
          {{ partial "format-icon.html" . }}
        </div>
        <h3>{{ .Title }}</h3>
        <p>{{ .Description }}</p>
        {{ if .Params.pricing }}
        <div class="format-hub-badges">
          {{ range .Params.pricing }}
          <span class="badge">{{ . }}</span>
          {{ end }}
        </div>
        {{ end }}
      </a>
      {{ end }}
    </div>
  </div>
</section>

{{ end }}
