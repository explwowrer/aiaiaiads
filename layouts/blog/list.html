{{ define "main" }}

<section class="section">
  <div class="container">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    <div class="grid grid-3 blog-grid">
      {{ range .Pages }}
      <a href="{{ .RelPermalink }}" class="card blog-card">
        <time class="blog-date" datetime="{{ .Date.Format "2006-01-02" }}">
          {{ .Date.Format "Jan 2, 2006" }}
        </time>
        <h3>{{ .Title }}</h3>
        <p>{{ .Description }}</p>
        <span class="blog-read-more">{{ i18n "read_more" }} &rarr;</span>
      </a>
      {{ end }}
    </div>
  </div>
</section>

{{ end }}
