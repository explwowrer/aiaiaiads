{{ define "main" }}

<article class="section">
  <div class="container prose">
    <h1>{{ .Params.h1 | default .Title }}</h1>
    {{ .Content }}
    {{ range .Pages }}
    <div style="margin-bottom: 1rem;">
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </div>
    {{ end }}
  </div>
</article>

{{ end }}
